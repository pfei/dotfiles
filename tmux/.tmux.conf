# Set prefix key to Ctrl-a (instead of default Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Enable mouse support (for scrolling, pane resizing, etc.)
set -g mouse on

# Start window numbering at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Reload config file with prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Open new windows in the same directory (Ctrl+a + c)
bind c new-window -c "#{pane_current_path}"

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes using Prefix + Arrow Keys
bind -r Left resize-pane -L 3
bind -r Right resize-pane -R 3
bind -r Up resize-pane -U 2
bind -r Down resize-pane -D 2

# Enable vi mode for copy mode
setw -g mode-keys vi

# Entering copy mode with prefix + Space
bind Space copy-mode

# Improve copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Window Navigation & Organization (Browser-style)
# --------------------------------------------------

# Rename window with F2 (no prefix)
bind-key -n F2 command-prompt -I "#W" "rename-window '%%'"

# Navigate between windows with Ctrl + PageUp/Down (no prefix)
bind-key -n C-PPage previous-window
bind-key -n C-NPage next-window

# Move windows left or right with Ctrl + Shift + PageUp/Down (no prefix)
# Use run-shell to ensure the focus (asterisk) follows the window during the swap
bind-key -n C-S-PPage run-shell "tmux swap-window -t -1; tmux select-window -t -1"
bind-key -n C-S-NPage run-shell "tmux swap-window -t +1; tmux select-window -t +1"

# Automatically renumber windows when one is closed
set-option -g renumber-windows on

# --------------------------------------------------

# Set status bars
set-option -g status-left-length 20
set-option -g status-right-length 40
set-option -g status-left "[#S]"
set-option -g status-right "| %H:%M | "
set-option -g status-style "bg=black,fg=white"

# History
set -g history-limit 100000

# copy terminal output
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \
    'xclip -selection clipboard -i'
